<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 5 - Part 1-2</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app">
    <button @click="score++">Click</button>
    <p>Score: {{ score }}</p>
  </div>

  <script>
    const { createApp, ref } = Vue

    createApp({
      setup() {
        const score = ref(0)
        return { score }
      }
    }).mount('#app')
  </script>
</body>
</html>
